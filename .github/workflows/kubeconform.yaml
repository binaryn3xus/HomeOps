---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kubeconform"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@8f52032f943acddc1c5670f437b94e031e78afc0 # master

      - name: Setup Tools
        run: |
          brew install kubeconform

      - name: Run flux-local build
        run: |
          docker run --rm -v ${{ github.workspace }}:/github/workspace ghcr.io/allenporter/flux-local:v8.1.0 \
            build ks \
            --path /github/workspace/kubernetes/flux/cluster \
            > manifests.yaml

      - name: Run kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-filename-pattern '.*\.sops\.yaml' \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
            manifests.yaml
