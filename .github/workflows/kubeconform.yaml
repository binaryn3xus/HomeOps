---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kubeconform"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Setup Tools
        run: |
          brew install kubeconform fluxcd/tap/flux

      - name: Run kubeconform
        shell: bash
        run: |
          # Use flux-local to build the cluster manifests
          # Note: We use flux-local via nix or similar if available, or just brew install it
          # Since it's not in brew, let's use the docker image to generate manifests if possible,
          # or just install the binary.
          curl -s https://raw.githubusercontent.com/allenporter/flux-local/main/scripts/install.sh | bash
          
          mkdir -p output
          ./flux-local build cluster \
            --path ./kubernetes/flux/cluster \
            --all-namespaces \
            --enable-helm \
            > output/manifests.yaml

          kubeconform \
            -strict \
            -ignore-filename-pattern '.*\.sops\.yaml' \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
            output/manifests.yaml
