---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazarr
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: bazarr-dst
  resources:
    requests:
      storage: 2Gi
  storageClassName: ceph-block
