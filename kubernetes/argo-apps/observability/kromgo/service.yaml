apiVersion: v1
kind: Service
metadata:
  name: kromgo
  namespace: observability
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: kromgo
    app.kubernetes.io/instance: kromgo
    app.kubernetes.io/controller: kromgo
