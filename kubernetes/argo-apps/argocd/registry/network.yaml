---
apiVersion: v1
kind: Namespace
metadata:
  name: network
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
# Helm-based Network Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network-helm-apps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - list:
        elements:
          - app: envoy-gateway
            path: kubernetes/argo-apps/network/envoy-gateway
            chart: gateway-helm
            repo: oci://mirror.gcr.io/envoyproxy/gateway-helm
            version: 1.7.1
            wave: "-1"
          - app: cloudflare-dns
            path: kubernetes/argo-apps/network/cloudflare-dns
            chart: external-dns
            repo: oci://ghcr.io/home-operations/charts-mirror/external-dns
            version: 1.20.0
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: network
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
---
# Plain Manifest Network Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network-plain-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: certificates-import
            path: kubernetes/argo-apps/network/certificates/import
            wave: "-1"
          - app: certificates-export
            path: kubernetes/argo-apps/network/certificates/export
          - app: cloudflare-tunnel
            path: kubernetes/argo-apps/network/cloudflare-tunnel
          - app: ddns-updater
            path: kubernetes/argo-apps/network/ddns-updater
          - app: pikvm
            path: kubernetes/argo-apps/network/pikvm
          - app: unifi-dns
            path: kubernetes/argo-apps/network/unifi-dns
          - app: echo
            path: kubernetes/argo-apps/network/echo
            wave: "1"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      source:
        repoURL: https://github.com/binaryn3xus/HomeOps
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: network
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
