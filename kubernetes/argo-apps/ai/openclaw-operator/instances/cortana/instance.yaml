---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/config/crd/bases/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: cortana
  namespace: ai
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.4.14
    pullPolicy: IfNotPresent
  selfConfigure:
    enabled: true
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - "network"
      additionalEgress:
        - ports:
            - port: 22
              protocol: TCP
            - port: 443
              protocol: TCP
            - port: 8000
              protocol: TCP
            - port: 50000
              protocol: TCP
    rbac:
      createServiceAccount: true
  skills:
    - pskoett/self-improving-agent
    - steipete/github
    - odrobnik/unifi-site-manager
  envFrom:
    - secretRef:
        name: openclaw-cortana-secret
  env:
    - name: PATH
      value: "/tools/bin:/home/openclaw/.openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    - name: TALOSCONFIG
      value: "/home/openclaw/.openclaw/talos/config"
  initContainers:

    - name: install-tools
      image: curlimages/curl:8.19.0@sha256:9a6f6a17667960e077f1b153009aaf18ac99a622221084e1938a45a06fff057a
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -euo pipefail
          mkdir -p /tools/bin /tools/home /tools/mise

          # Redirect all mise state to the shared tools volume
          export HOME=/tools/home
          export MISE_DATA_DIR=/tools/mise
          export MISE_CACHE_DIR=/tools/mise/cache
          export MISE_STATE_DIR=/tools/mise/state
          export MISE_CONFIG_FILE=/tools/mise.toml

          # Install mise (using musl binary for Alpine compatibility)
          curl -fsSL https://github.com/jdx/mise/releases/download/v2026.4.5/mise-v2026.4.5-linux-x64-musl > /tools/bin/mise
          chmod +x /tools/bin/mise

          /tools/bin/mise install --yes

          # Symlink from mise managed paths to /tools/bin
          ln -sf "$(/tools/bin/mise which gh)" /tools/bin/gh
          ln -sf "$(/tools/bin/mise which kubectl)" /tools/bin/kubectl
          ln -sf "$(/tools/bin/mise which talosctl)" /tools/bin/talosctl
      volumeMounts:
        - name: tools
          mountPath: /tools
        - name: mise-config
          mountPath: /tools/mise.toml
          subPath: mise.toml
  extraVolumes:
    - name: tools
      emptyDir: {}
    - name: mise-config
      configMap:
        name: cortana-mise-config
    - name: talos-config
      secret:
        secretName: openclaw-cortana-secret
        items:
          - key: TALOS_CONFIG
            path: config
  extraVolumeMounts:
    - name: tools
      mountPath: /tools
    - name: talos-config
      mountPath: /home/openclaw/.openclaw/talos/config
      subPath: config
  storage:
    persistence:
      enabled: true
      existingClaim: openclaw-cortana
  config:
    mergeMode: "merge"
    raw:
      gateway:
        port: 18789
        controlUi:
          allowedOrigins:
            - "https://cortana.unscfleet.com"
          dangerouslyDisableDeviceAuth: false
      channels:
        discord:
          enabled: true
          markdown:
            tables: block
          groupPolicy: allowlist
          historyLimit: 20
          replyToMode: off
          ackReaction: ""
          configWrites: false
          textChunkLimit: 1800
          maxLinesPerMessage: 80
          actions:
            moderation: false
            roles: false
            presence: false
          execApprovals:
            enabled: true
            target: channel
            cleanupAfterResolve: true
            approvers:
              - "210731922320523264"
          guilds:
            "1016510099310792744":
              requireMention: true
              ignoreOtherMentions: false
              users:
                - "210731922320523264"
              channels:
                "1492603577150210190":
                  allow: true
                  requireMention: false
