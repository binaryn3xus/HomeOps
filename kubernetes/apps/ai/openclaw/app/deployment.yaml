---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: openclaw
      app.kubernetes.io/controller: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: openclaw
        app.kubernetes.io/controller: openclaw
    spec:
      containers:
        - name: app
          image: ghcr.io/openclaw/openclaw:latest
          securityContext:
            runAsUser: 1000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ai.svc.cluster.local:11434"
            - name: LLM_MODEL
              value: "qwen2.5-coder:7b"
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-data
