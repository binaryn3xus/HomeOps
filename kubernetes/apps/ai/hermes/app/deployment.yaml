---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: docker.io/library/alpine:3.21
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              cp /tmp/config.yaml /opt/data/config.yaml
              chown 10000:10000 /opt/data/config.yaml
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-file
              mountPath: /tmp/config.yaml
              subPath: config.yaml
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.5.16@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          args: ["gateway", "run"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8642
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              add: ["CHOWN"]
              drop: ["ALL"]
        - name: dashboard
          image: nousresearch/hermes-agent:v2026.5.16@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
          env:
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: config-file
          configMap:
            name: hermes-config
