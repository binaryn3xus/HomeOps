---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: docker.io/library/debian:12-slim
          securityContext:
            runAsUser: 0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              apt-get update && apt-get install -y curl bash ca-certificates
              # Ensure the Master config is in place
              mkdir -p /opt/data/dotnet
              cp /tmp/config.yaml /opt/data/config.yaml
              
              # Install .NET SDK to PVC if missing
              if [ ! -f /opt/data/dotnet/dotnet ]; then
                echo "Installing .NET 10.0 SDK..."
                curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --install-dir /opt/data/dotnet --version 10.0 --no-path
              fi

              # SCALABLE SYNC: Link every profile's config back to Master
              if [ -d /opt/data/profiles ]; then
                # Ensure every profile subdirectory has a linked config
                find /opt/data/profiles -mindepth 1 -maxdepth 1 -type d | while read -r profile_dir; do
                  ln -sf /opt/data/config.yaml "$profile_dir/config.yaml"
                done
              fi
              chown -R 10000:10000 /opt/data || true
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-file
              mountPath: /tmp/config.yaml
              subPath: config.yaml
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          # Let s6 manage all gateways (default + profiles) automatically. 
          # We just need to keep the container alive and show logs.
          args:
            - sh
            - -c
            - |
              # Wait for s6 to start the services
              sleep 5
              # Follow the main logs so they appear in kubectl logs
              tail -f /opt/data/logs/agent.log
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: TZ
              value: America/New_York
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: DOTNET_ROOT
              value: "/opt/data/dotnet"
            - name: PATH
              value: "/opt/data/dotnet:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 8642
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
        - name: dashboard
          image: nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_DASHBOARD_ONLY
              value: "true"
            # Redirect s6 profile registration to nowhere so dashboard doesn't start gateways
            - name: S6_PROFILE_GATEWAY_SCANDIR
              value: /tmp/ignored-services
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
          ports:
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: config-file
          configMap:
            name: hermes-config
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
