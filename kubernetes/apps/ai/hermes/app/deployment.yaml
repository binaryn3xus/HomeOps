---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: docker.io/library/alpine:3.23
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              cp /tmp/config.yaml /opt/data/config.yaml
              chown 10000:10000 /opt/data/config.yaml
              chown 10000:10000 /run /tmp
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-file
              mountPath: /tmp/config.yaml
              subPath: config.yaml
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          args: ["gateway", "run"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: TZ
              value: America/New_York
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: HERMES_DASHBOARD
              value: "true"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: DASHBOARD_INSECURE
              value: "true"
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
            - name: PATH
              value: "/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 8642
              name: http
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: config-file
          configMap:
            name: hermes-config
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
