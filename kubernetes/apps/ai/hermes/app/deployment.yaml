---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: setup
          image: docker.io/library/debian:12-slim
          securityContext:
            runAsUser: 0
          command: ["bash", "/tmp/scripts/setup.sh"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-source
              mountPath: /tmp/config-source
            - name: scripts
              mountPath: /tmp/scripts
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          # Single container runs both Gateway + Dashboard via internal S6
          args: ["gateway", "run", "--dashboard"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: DOTNET_ROOT
              value: "/opt/data/dotnet"
            - name: PATH
              value: "/opt/data/dotnet:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: TZ
              value: America/New_York
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 8642
              name: http
            - containerPort: 9119
              name: dashboard
          livenessProbe:
            exec:
              command: ["hermes", "gateway", "status"]
            initialDelaySeconds: 60
            periodSeconds: 60
          readinessProbe:
            exec:
              command: ["hermes", "gateway", "status"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: config-source
          configMap:
            name: hermes-config
        - name: scripts
          configMap:
            name: hermes-scripts
            defaultMode: 0755
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
