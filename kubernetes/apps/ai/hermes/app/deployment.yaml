---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/instance: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/instance: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: setup
          image: nousresearch/hermes-agent:v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
          command: ["bash", "/tmp/scripts/setup.sh"]
          env:
            - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-source
              mountPath: /tmp/config-source
            - name: scripts
              mountPath: /tmp/scripts
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
          # BYPASS S6: Run processes directly
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Load persisted environment
              if [ -f /opt/data/hermes.env ]; then
                source /opt/data/hermes.env
              fi

              # Start the dashboard in the background
              /opt/hermes/.venv/bin/hermes dashboard --host 0.0.0.0 --insecure &
              # Run the gateway in the foreground
              /opt/hermes/.venv/bin/hermes gateway run --no-supervise
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: DOTNET_ROOT
              value: "/opt/data/dotnet"
            - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
              value: "1"
            - name: PATH
              value: "/opt/data/dotnet:/opt/data/.dotnet/tools:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: TZ
              value: America/New_York
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 8642
              name: gateway
            - containerPort: 9119
              name: dashboard
          livenessProbe:
            httpGet:
              path: /login
              port: dashboard
            initialDelaySeconds: 60
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /login
              port: dashboard
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config-source
          configMap:
            name: hermes-config
        - name: scripts
          configMap:
            name: hermes-scripts
            defaultMode: 0755
        - name: tmp
          emptyDir: {}
