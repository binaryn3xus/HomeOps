---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: docker.io/library/alpine:3.23
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              cp /tmp/config.yaml /opt/data/config.yaml
              chown 10000:10000 /opt/data/config.yaml
              chown 10000:10000 /run-hermes /run-dashboard /tmp-hermes /tmp-dashboard
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-file
              mountPath: /tmp/config.yaml
              subPath: config.yaml
            - name: run-hermes
              mountPath: /run-hermes
            - name: run-dashboard
              mountPath: /run-dashboard
            - name: tmp-hermes
              mountPath: /tmp-hermes
            - name: tmp-dashboard
              mountPath: /tmp-dashboard
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.5.28@sha256:497d818208838f2cd3fb992b999450856acc725c6d97c55962289f1fd92b8b91
          args: ["gateway", "run"]
          securityContext:
            runAsUser: 0
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: TZ
              value: America/New_York
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: PATH
              value: "/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 8642
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: run-hermes
              mountPath: /run
            - name: tmp-hermes
              mountPath: /tmp
        - name: dashboard
          image: nousresearch/hermes-agent:v2026.5.28@sha256:497d818208838f2cd3fb992b999450856acc725c6d97c55962289f1fd92b8b91
          args: ["dashboard", "--host", "0.0.0.0", "--insecure"]
          securityContext:
            runAsUser: 0
          env:
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
            - name: TZ
              value: America/New_York
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
          envFrom:
            - secretRef:
                name: hermes-agent-secret
          ports:
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: run-dashboard
              mountPath: /run
            - name: tmp-dashboard
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: config-file
          configMap:
            name: hermes-config
        - name: run-hermes
          emptyDir: {}
        - name: run-dashboard
          emptyDir: {}
        - name: tmp-hermes
          emptyDir: {}
        - name: tmp-dashboard
          emptyDir: {}
