model:
  default: "gpt-5.3-codex"
  provider: "openai-codex"

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"
  toolsets:
    - all

approvals:
  mode: "smart"

consents:
  outbound_access:
    mode: "smart"
    allowlist:
      - "10.0.10.1"
      - "*.unscfleet.com"
      - "*.svc.cluster.local"
      - "api.github.com"
      - "github.com"

kanban:
  auto_decompose: true
  auto_promote_profiles:
    - "networker"
    - "default"

terminal:
  backend: "local"
  cwd: "/opt/data"
  timeout: 60

display:
  personality: "kawaii"
  streaming: true
  tool_progress: all

discord:
  require_mention: true
  free_response_channels: ""
  allowed_channels: "1506866536508555414"
  auto_thread: true
  thread_require_mention: false
  history_backfill: true
  history_backfill_limit: 30
  reactions: false
  channel_prompts: {}
  dm_role_auth_guild: ""
  server_actions: ""

skills:
  creation_nudge_interval: 15
