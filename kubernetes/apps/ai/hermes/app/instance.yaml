---
apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes
  namespace: ai
spec:
  image:
    repository: nousresearch/hermes-agent
    tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
  
  security:
    # Intended Way: Explicitly align with the non-root image requirements
    containerSecurityContext:
      readOnlyRootFilesystem: false
      runAsUser: 10000
      runAsGroup: 10000
    podSecurityContext:
      runAsUser: 10000
      runAsGroup: 10000
      fsGroup: 10000
      fsGroupChangePolicy: OnRootMismatch

  config:
    configMapRef:
      name: hermes-config

  gateways:
    discord:
      enabled: true
      botTokenSecretRef:
        name: hermes-agent-secret
        key: DISCORD_BOT_TOKEN
  
  env:
    - name: HERMES_HOME
      value: "/home/hermes/.hermes"
    - name: DOTNET_ROOT
      value: "/home/hermes/.hermes/dotnet"
    - name: PATH
      value: "/home/hermes/.hermes/dotnet:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    - name: HERMES_DASHBOARD
      value: "true"
  
  envFrom:
    - secretRef:
        name: hermes-agent-secret

  initContainers:
    - name: setup
      image: nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
      command: ["bash", "/tmp/scripts/setup.sh"]
      volumeMounts:
        - name: data
          mountPath: /home/hermes/.hermes
        - name: scripts
          mountPath: /tmp/scripts

  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ceph-block

  runtime:
    uv:
      enabled: false

  # Intended Way: Provide the required writable directories via extraVolumes
  extraVolumes:
    - name: scripts
      configMap:
        name: hermes-scripts
        defaultMode: 0755
    - name: run
      emptyDir: {}

  extraVolumeMounts:
    - name: run
      mountPath: /run

  networking:
    service:
      ports:
        - name: gateway
          port: 8443
          targetPort: 8642
        - name: dashboard
          port: 9119
          targetPort: 9119
