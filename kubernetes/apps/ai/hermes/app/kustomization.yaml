---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./instance.yaml
  - ./externalsecret.yaml
  - ./httproute.yaml
  - ./rbac.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml
  - name: hermes-scripts
    files:
      - setup.sh
generatorOptions:
  disableNameSuffixHash: true

# Bypass S6: Overwrite the command/args for the operator's StatefulSet
patches:
  - target:
      kind: StatefulSet
      name: hermes
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["/opt/hermes/.venv/bin/hermes"]
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: ["gateway", "run", "--no-supervise"]
