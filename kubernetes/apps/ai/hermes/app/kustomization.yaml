---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./instance.yaml
  - ./externalsecret.yaml
  - ./httproute.yaml
  - ./rbac.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml
  - name: hermes-scripts
    files:
      - setup.sh
generatorOptions:
  disableNameSuffixHash: true
