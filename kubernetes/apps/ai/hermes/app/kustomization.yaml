---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./deployment.yaml
  - ./externalsecret.yaml
  - ./service.yaml
  - ./httproute.yaml
  - ./rbac.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml
generatorOptions:
  disableNameSuffixHash: true
