---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: openclaw-operator
      version: "0.26.2"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: ai
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Default values are usually fine for the operator
    replicaCount: 1
