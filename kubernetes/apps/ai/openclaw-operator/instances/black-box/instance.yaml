---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: black-box
  namespace: ai
spec:
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - "network"
  envFrom:
    - secretRef:
        name: black-box-discord-secret
  storage:
    persistence:
      enabled: true
      existingClaim: openclaw-data
  config:
    raw:
      gateway:
        port: 18789
        controlUi:
          allowedOrigins:
            - "https://openclaw.unscfleet.com"
      models:
        providers:
          openai:
            api: "openai-responses"
            baseUrl: "https://api.openai.com/v1"
            models:
              - id: "gpt-4o"
                name: "GPT-4o"
              - id: "gpt-4o-mini"
                name: "GPT-4o Mini"
      channels:
        discord:
          enabled: true
          token: "${DISCORD_BOT_TOKEN}"
          guilds:
            "1016510099310792744": {}
      agents:
        defaults:
          timeoutSeconds: 600
        list:
          - id: "default"
            name: "Default Agent"
            model: "openai/gpt-4o"
