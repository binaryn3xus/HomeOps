---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: black-box
  namespace: ai
spec:
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - "network"
  env:
    - name: DISCORD_BOT_TOKEN
      valueFrom:
        secretKeyRef:
          name: black-box-discord-secret
          key: DISCORD_BOT_TOKEN
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: black-box-discord-secret
          key: OPENAI_API_KEY
  storage:
    persistence:
      enabled: true
      existingClaim: openclaw-data
  config:
    mergeMode: "overwrite"
    raw:
      agents:
        defaults:
          timeoutSeconds: 600
        list:
          - id: "default"
            model: "openai/gpt-4o"
            name: "Default Agent"
      channels:
        discord:
          enabled: true
          token: "${DISCORD_BOT_TOKEN}"
          guilds:
            "1016510099310792744":
              requireMention: false
      gateway:
        port: 18789
        controlUi:
          allowedOrigins:
            - "https://openclaw.unscfleet.com"
          dangerouslyDisableDeviceAuth: true
      models:
        providers:
          openai:
            api: "openai-responses"
            baseUrl: "https://api.openai.com/v1"
            models:
              - id: "gpt-4o"
                name: "GPT-4o"
              - id: "gpt-4o-mini"
                name: "GPT-4o Mini"
