---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/config/crd/bases/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: black-box
  namespace: ai
spec:
  selfConfigure:
    enabled: true
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - "network"
    rbac:
      createServiceAccount: true
  env:
    - name: DISCORD_BOT_TOKEN
      valueFrom:
        secretKeyRef:
          name: black-box-discord-secret
          key: DISCORD_BOT_TOKEN
    - name: GEMINI_API_KEY
      valueFrom:
        secretKeyRef:
          name: black-box-discord-secret
          key: GEMINI_API_KEY
    - name: PATH
      value: "/home/openclaw/.openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  storage:
    persistence:
      enabled: true
      existingClaim: openclaw-data
  config:
    mergeMode: "overwrite"
    raw:
      gateway:
        port: 18789
        controlUi:
          allowedOrigins:
            - "https://openclaw.unscfleet.com"
          dangerouslyDisableDeviceAuth: false
      models:
        providers:
          google:
            api: "google-generative-ai"
            baseUrl: "https://generativelanguage.googleapis.com/v1beta"
            models:
              - id: "gemini-2.5-flash"
                name: "Gemini 2.5 Flash"
      channels:
        discord:
          enabled: true
          token: "${DISCORD_BOT_TOKEN}"
          guilds:
            "1016510099310792744":
              requireMention: false
      agents:
        defaults:
          timeoutSeconds: 600
        list:
          - id: "default"
            name: "Default Agent"
            model: "google/gemini-2.5-flash"
