---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-cortana
  namespace: ai
spec:
  data:
    - remoteRef:
        key: Discord-Cortana-Bot-Token
      secretKey: discord_token
    - remoteRef:
        key: Google-Gemini-API-HomeOps-Key
      secretKey: gemini_api_key
    - remoteRef:
        key: Paperless-Api-Auth-Token
      secretKey: paperless_token
    - remoteRef:
        key: Github-Cortana-Token
      secretKey: github_token
    - remoteRef:
        key: Talos-Config
      secretKey: talos_config
    - remoteRef:
        key: Unifi-API-Key
      secretKey: unifi_api_key
  refreshInterval: "12h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    creationPolicy: Owner
    name: openclaw-cortana-secret
    template:
      data:
        DISCORD_BOT_TOKEN: "{{ .discord_token }}"
        GEMINI_API_KEY: "{{ .gemini_api_key }}"
        PPLS_HOSTNAME: "http://paperless.paperless.svc.cluster.local:8000"
        PPLS_TOKEN: "{{ .paperless_token }}"
        GH_TOKEN: "{{ .github_token }}"
        GITHUB_TOKEN: "{{ .github_token }}"
        TALOS_CONFIG: "{{ .talos_config }}"
        UNIFI_API_KEY: "{{ .unifi_api_key }}"
      engineVersion: v2
