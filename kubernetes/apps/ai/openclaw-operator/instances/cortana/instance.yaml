---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/config/crd/bases/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: cortana
  namespace: ai
spec:
  selfConfigure:
    enabled: true
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - "network"
      additionalEgress:
        - ports:
            - port: 8000
              protocol: TCP
            - port: 443
              protocol: TCP
    rbac:
      createServiceAccount: true
  envFrom:
    - secretRef:
        name: openclaw-cortana-secret
  env:
    - name: PATH
      value: "/tools/bin:/home/openclaw/.openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  initContainers:
    - name: install-tools
      image: curlimages/curl:8.12.1@sha256:0d90d8591873f1d9426f04730600a94b5953046bc84ef64a2f864bc3510526e9
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -euo pipefail
          mkdir -p /tools/bin /tools/mise
          
          # Install mise
          curl -fsSL https://mise.jdx.dev/mise-latest-linux-x64 > /tools/bin/mise
          chmod +x /tools/bin/mise
          
          export MISE_DATA_DIR=/tools/mise
          export MISE_CONFIG_FILE=/tools/mise.toml
          /tools/bin/mise install --yes
          
          # Symlink from mise managed paths to /tools/bin
          ln -sf "$(/tools/bin/mise which gh)" /tools/bin/gh
          ln -sf "$(/tools/bin/mise which kubectl)" /tools/bin/kubectl
          
          # Also symlink system git if available, or just rely on PATH
          # curlimages/curl usually doesn't have git, let's check or use mise for git too
          # actually mise can manage git if we use asdf-git or similar, but let's stick to gh/kubectl for now
          # and see if git is already in the main container.
      volumeMounts:
        - name: tools
          mountPath: /tools
        - name: mise-config
          mountPath: /tools/mise.toml
          subPath: mise.toml
  extraVolumes:
    - name: tools
      emptyDir: {}
    - name: mise-config
      configMap:
        name: cortana-mise-config
  extraVolumeMounts:
    - name: tools
      mountPath: /tools
  storage:
    persistence:
      enabled: true
      existingClaim: openclaw-cortana-data
  config:
    mergeMode: "merge"
    raw:
      gateway:
        port: 18789
        controlUi:
          allowedOrigins:
            - "https://cortana.unscfleet.com"
          dangerouslyDisableDeviceAuth: false
