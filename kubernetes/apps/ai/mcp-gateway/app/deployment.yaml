apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: ghcr.io/all-hands-ai/python-nodejs:python3.11-nodejs22-slim
          imagePullPolicy: IfNotPresent
          command: 
            - "/bin/sh"
            - "-c"
            - |
              set -xe
              curl -L https://github.com/github/github-mcp-server/releases/download/v0.32.0/github-mcp-server_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin github-mcp-server
              chmod +x /usr/local/bin/github-mcp-server
              uv pip install --system fastmcp
              python /app/main.py
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: FASTMCP_MESSAGE_PATH
              value: "/messages/"
            - name: GITHUB_PERSONAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GITHUB_PERSONAL_TOKEN
            - name: GITHUB_PERSONAL_ACCESS_TOKEN # For the new official server
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GITHUB_PERSONAL_TOKEN
            - name: GITHUB_ENTERPRISE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GITHUB_ENTERPRISE_TOKEN
            - name: GITHUB_ENTERPRISE_URL
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GITHUB_ENTERPRISE_URL
          volumeMounts:
            - name: config
              mountPath: /app/main.py
              subPath: main.py
      volumes:
        - name: config
          configMap:
            name: mcp-gateway-config
