apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: ollama
      app.kubernetes.io/controller: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/instance: ollama
        app.kubernetes.io/controller: ollama
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: sku
          operator: Equal
          value: gpu
          effect: NoSchedule
      initContainers:
        - name: pull-models
          image: docker.io/ollama/ollama:0.20.6
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting Ollama server for model pulling..."
              ollama serve &
              OLLAMA_PID=$!

              # Wait for Ollama to be ready
              echo "Waiting for Ollama to start..."
              for i in $(seq 1 30); do
                if ollama list >/dev/null 2>&1; then
                  echo "Ollama is ready!"
                  break
                fi
                sleep 2
              done

              # Pull required models
              echo "Pulling llama3.2..."
              ollama pull llama3.2:latest

              echo "Pulling nomic-embed-text for embeddings..."
              ollama pull nomic-embed-text

              echo "Pulling qwen2.5-coder:7b..."
              ollama pull qwen2.5-coder:7b

              echo "All models pulled successfully!"
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: 0.0.0.0
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: app
          image: docker.io/ollama/ollama:0.20.6
          env:
            - name: TZ
              value: "America/New_York"
            - name: OLLAMA_HOST
              value: 0.0.0.0
            - name: OLLAMA_ORIGINS
              value: "*"
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "4096"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 2000m
              memory: 12Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-openebs-pvc
