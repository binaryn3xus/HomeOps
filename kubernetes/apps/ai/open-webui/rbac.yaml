apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openwebui-cluster-view
subjects:
- kind: ServiceAccount
  name: default
  namespace: ai
roleRef:
  kind: ClusterRole
  name: view  # This is a built-in K8s role for read-only access
  apiGroup: rbac.authorization.k8s.io
