---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: open-webui-dst
  resources:
    requests:
      storage: 20Gi
  storageClassName: ceph-block
