---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: home-assistant-dst
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-block
