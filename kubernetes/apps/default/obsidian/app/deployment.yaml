apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian
      app.kubernetes.io/instance: obsidian
      app.kubernetes.io/controller: obsidian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian
        app.kubernetes.io/instance: obsidian
        app.kubernetes.io/controller: obsidian
    spec:
      securityContext:
        runAsNonRoot: false
      hostAliases:
        - ip: "10.0.30.33"
          hostnames:
            - "couchdb.unscfleet.com"
      containers:
        - name: app
          image: lscr.io/linuxserver/obsidian:latest
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: DISABLE_GPU
              value: "true"
            - name: OBSIDIAN_EXTRA_FLAGS
              value: "--disable-gpu --no-sandbox --disable-gpu-compositing"
            - name: LIBGL_ALWAYS_SOFTWARE
              value: "1"
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: obsidian
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
