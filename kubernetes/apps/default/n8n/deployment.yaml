apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: n8n
      app.kubernetes.io/controller: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/controller: n8n
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: ghcr.io/n8n-io/n8n:2.17.0
          env:
            - name: DB_SQLITE_VACUUM_ON_STARTUP
              value: "true"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: "7"
            - name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
              value: "50000"
            - name: GENERIC_TIMEZONE
              value: "America/New_York"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "false"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_PORT
              value: "8080"
            - name: N8N_HOST
              value: "n8n.unscfleet.com"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.unscfleet.com/"
            - name: WEBHOOK_URL
              value: "https://n8n.unscfleet.com/"
            - name: N8N_LOG_LEVEL
              value: "info"
            - name: N8N_LOG_OUTPUT
              value: "console"
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /home/node/.n8n
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: n8n
