apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr
  namespace: default
  annotations:
    gatus.home-operations.com/endpoint: |-
      dns:
        query-name: sonarr.unscfleet.com
        query-type: A
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - sonarr.unscfleet.com
  rules:
    - backendRefs:
        - name: sonarr
          port: 80
