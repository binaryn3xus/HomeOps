apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vert
  namespace: default
  labels:
    app.kubernetes.io/name: vert
    app.kubernetes.io/instance: vert
    app.kubernetes.io/controller: it-tools
  annotations:
    gatus.home-operations.com/endpoint: |-
      group: external
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - vert.unscfleet.com
  rules:
    - backendRefs:
        - name: vert
          port: 80
