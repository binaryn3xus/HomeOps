apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee
    app.kubernetes.io/instance: zigbee
    app.kubernetes.io/controller: zigbee
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee
      app.kubernetes.io/instance: zigbee
      app.kubernetes.io/controller: zigbee
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee
        app.kubernetes.io/instance: zigbee
        app.kubernetes.io/controller: zigbee
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: ghcr.io/koenkk/zigbee2mqtt:2.9.1@sha256:574b2bd0dcbb59fae6edbbb81a35b5563291d3825da0225f0078aa5575dac37f
          envFrom:
            - configMapRef:
                name: zigbee-config
          ports:
            - name: http
              containerPort: 80
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: zigbee
