apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tautulli
  namespace: default
  annotations:
    gatus.home-operations.com/endpoint: 'dns: { query-name: tautulli.unscfleet.com }'
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - tautulli.unscfleet.com
  rules:
    - backendRefs:
        - name: tautulli
          port: 8181
