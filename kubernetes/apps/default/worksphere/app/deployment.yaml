---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worksphere
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worksphere
      app.kubernetes.io/instance: worksphere
      app.kubernetes.io/controller: worksphere
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worksphere
        app.kubernetes.io/instance: worksphere
        app.kubernetes.io/controller: worksphere
    spec:
      containers:
        - name: app
          image: ghcr.io/binaryn3xus/worksphere:1.0.0
          envFrom:
            - secretRef:
                name: worksphere-secret
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
