apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: audiobookshelf
  namespace: default
  labels:
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/instance: audiobookshelf
    app.kubernetes.io/controller: audiobookshelf
  annotations:
    gatus.home-operations.com/endpoint: |-
      group: external
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - audiobookshelf.unscfleet.com
    - audiobooks.unscfleet.com
  rules:
    - backendRefs:
        - name: audiobookshelf
          port: 80
