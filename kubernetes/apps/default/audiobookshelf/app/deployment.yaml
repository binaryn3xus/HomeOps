apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiobookshelf
      app.kubernetes.io/instance: audiobookshelf
      app.kubernetes.io/controller: audiobookshelf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiobookshelf
        app.kubernetes.io/instance: audiobookshelf
        app.kubernetes.io/controller: audiobookshelf
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: ghcr.io/advplyr/audiobookshelf:2.33.1
          env:
            - name: TZ
              value: "America/New_York"
            - name: AUDIOBOOKSHELF_UID
              value: "568"
            - name: AUDIOBOOKSHELF_GID
              value: "568"
            - name: CONFIG_PATH
              value: /config
            - name: METADATA_PATH
              value: /config/metadata
            - name: ROUTER_BASE_PATH
              value: /
          ports:
            - name: http
              containerPort: 80
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 80
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe: &probe
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe: *probe
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 1000m
              memory: 2500Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: tmpfs
              mountPath: /.npm
              subPath: .npm
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: audiobookshelf
        - name: media
          persistentVolumeClaim:
            claimName: synology-media
        - name: tmpfs
          emptyDir: {}
