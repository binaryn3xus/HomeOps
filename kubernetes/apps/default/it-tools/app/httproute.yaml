apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: it-tools
  namespace: default
  labels:
    app.kubernetes.io/name: it-tools
    app.kubernetes.io/instance: it-tools
    app.kubernetes.io/controller: it-tools
  annotations:
    gatus.home-operations.com/endpoint: |-
      group: external
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - it-tools.unscfleet.com
  rules:
    - backendRefs:
        - name: it-tools
          port: 80
