---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      paperless-ngx:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.13
            env:
              TZ: "America/New_York"
              PAPERLESS_PORT: &port 8000
              PAPERLESS_URL: https://paperless.unscfleet.com
              PAPERLESS_REDIS: redis://paperless-redis.default.svc.cluster.local:6379
              PAPERLESS_DBHOST: paperless-db-rw.default.svc.cluster.local
              PAPERLESS_DBNAME: paperless
              PAPERLESS_DBUSER: paperless
              # We map the password explicitly from the secret CNPG generates
              PAPERLESS_DBPASS:
                valueFrom:
                  secretKeyRef:
                    name: paperless-db-app
                    key: password
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_TIME_ZONE: "America/New_York"
              PAPERLESS_OCR_USER_ARGS: '{"optimize":1,"pdfa_image_compression":"jpeg"}'
            envFrom:
              - secretRef:
                  name: paperless-ngx-secret
            resources:
              requests:
                cpu: 100m
                memory: 1000Mi
              limits:
                memory: 4000Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: paperless-ngx
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            conditions: ["len([BODY]) == 0"]
            group: internal
            dns:
              query-name: {{ .Release.Name }}.unscfleet.com
              query-type: A
            url: 1.1.1.1
        hostnames:
          - "{{ .Release.Name }}.unscfleet.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    persistence:
      # Temporarily using emptyDir for rapid "operational first" deployment
      data:
        type: emptyDir
        globalMounts:
          - path: /usr/src/paperless/data
      media:
        type: emptyDir
        globalMounts:
          - path: /usr/src/paperless/media
      export:
        type: emptyDir
        globalMounts:
          - path: /usr/src/paperless/export
      consume:
        type: emptyDir
        globalMounts:
          - path: /usr/src/paperless/consume
---
# Simple Redis for Paperless
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-redis
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 3.7.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      paperless-redis:
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/redis
              tag: 7.4.2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: paperless-redis
        ports:
          http:
            port: 6379
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
