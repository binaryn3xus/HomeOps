apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  namespace: default
  annotations:
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |-
      conditions: ["len([BODY]) == 0"]
      group: internal
      dns:
        query-name: prowlarr.unscfleet.com
        query-type: A
      url: 1.1.1.1
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - prowlarr.unscfleet.com
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: prowlarr
          port: 80
          weight: 1
