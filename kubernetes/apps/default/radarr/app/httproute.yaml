apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radarr
  namespace: default
  annotations:
    gatus.home-operations.com/endpoint: 'dns: { query-name: radarr.unscfleet.com }'
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - radarr.unscfleet.com
  rules:
    - backendRefs:
        - name: radarr
          port: 80
