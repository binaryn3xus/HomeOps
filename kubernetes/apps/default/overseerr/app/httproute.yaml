apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overseerr
  namespace: default
  annotations:
    gatus.home-operations.com/endpoint: |-
      group: external
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - overseerr.unscfleet.com
    - requests.unscfleet.com
  rules:
    - backendRefs:
        - name: overseerr
          port: 80
