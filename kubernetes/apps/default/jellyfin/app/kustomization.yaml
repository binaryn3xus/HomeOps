---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./deployment.yaml
  - ./service.yaml
  - ./httproute.yaml
configMapGenerator:
  - name: jellyfin-config
    files:
      - encoding.xml=./resources/encoding.xml
generatorOptions:
  disableNameSuffixHash: true
