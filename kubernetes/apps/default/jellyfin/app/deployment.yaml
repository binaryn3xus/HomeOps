apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: default
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
      app.kubernetes.io/instance: jellyfin
      app.kubernetes.io/controller: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/instance: jellyfin
        app.kubernetes.io/controller: jellyfin
    spec:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [107]
      initContainers:
        - name: init-config
          image: public.ecr.aws/docker/library/busybox:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /config/config
              cp /tmp/encoding.xml /config/config/encoding.xml
              chown 568:568 /config/config/encoding.xml
          volumeMounts:
            - name: config
              mountPath: /config
            - name: encoding-xml
              mountPath: /tmp/encoding.xml
              subPath: encoding.xml
      containers:
        - name: app
          image: ghcr.io/jellyfin/jellyfin:10.11.8
          env:
            - name: TZ
              value: "America/New_York"
            - name: JELLYFIN_PublishedServerUrl
              value: https://jellyfin.unscfleet.com
          ports:
            - name: http
              containerPort: 8096
          startupProbe:
            tcpSocket:
              port: 8096
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe: &probe
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe: *probe
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: "1"
              memory: 6Gi
              gpu.intel.com/i915: "1"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: cache
              mountPath: /cache
            - name: transcode
              mountPath: /transcode
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin
        - name: media
          persistentVolumeClaim:
            claimName: synology-media
        - name: encoding-xml
          configMap:
            name: jellyfin-config
        - name: cache
          emptyDir: {}
        - name: transcode
          emptyDir: {}
        - name: tmp
          emptyDir: {}
