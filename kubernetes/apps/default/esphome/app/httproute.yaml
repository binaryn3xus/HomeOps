apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: esphome
  namespace: default
  annotations:
    gatus.home-operations.com/endpoint: 'dns: { query-name: esphome.unscfleet.com }'
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - esphome.unscfleet.com
  rules:
    - backendRefs:
        - name: esphome
          port: 6052
