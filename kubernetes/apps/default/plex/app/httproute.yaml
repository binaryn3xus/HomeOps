apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  namespace: default
  labels:
    app.kubernetes.io/name: plex
    app.kubernetes.io/instance: plex
    app.kubernetes.io/controller: plex
  annotations:
    gatus.home-operations.com/endpoint: |-
      conditions: ["[STATUS] == 401"]
      group: external
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - plex.unscfleet.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /library/streams
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove: ["Range"]
      backendRefs:
        - name: plex
          port: 32400
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: plex
          port: 32400
