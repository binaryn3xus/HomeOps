---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag
spec:
  schedule: "0 4 * * 0" # Every Sunday at 4am UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: defrag-node1
              image: ghcr.io/siderolabs/talosctl:v1.12.5
              command: ["/talosctl"]
              args: ["--nodes", "10.0.30.11", "etcd", "defrag"]
              env:
                - name: TALOSCONFIG
                  value: /var/run/secrets/talos.dev/config
              volumeMounts:
                - name: talos-secrets
                  mountPath: /var/run/secrets/talos.dev
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
            - name: defrag-node2
              image: ghcr.io/siderolabs/talosctl:v1.12.5
              command: ["/talosctl"]
              args: ["--nodes", "10.0.30.12", "etcd", "defrag"]
              env:
                - name: TALOSCONFIG
                  value: /var/run/secrets/talos.dev/config
              volumeMounts:
                - name: talos-secrets
                  mountPath: /var/run/secrets/talos.dev
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
            - name: defrag-node3
              image: ghcr.io/siderolabs/talosctl:v1.12.5
              command: ["/talosctl"]
              args: ["--nodes", "10.0.30.13", "etcd", "defrag"]
              env:
                - name: TALOSCONFIG
                  value: /var/run/secrets/talos.dev/config
              volumeMounts:
                - name: talos-secrets
                  mountPath: /var/run/secrets/talos.dev
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: talos-secrets
              secret:
                secretName: etcd-defrag-talos-secrets
---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: etcd-defrag-talos-secrets
spec:
  roles:
    - os:admin
