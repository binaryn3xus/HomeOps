apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-2025
  namespace: database
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mssql-2025
      app.kubernetes.io/instance: mssql-2025
      app.kubernetes.io/controller: main
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mssql-2025
        app.kubernetes.io/instance: mssql-2025
        app.kubernetes.io/controller: main
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        mssql2025-compatible: "true"
      containers:
        - name: main
          image: mcr.microsoft.com/mssql/server:2025-latest
          envFrom:
            - configMapRef:
                name: mssql-2025-config
            - secretRef:
                name: mssql-2025-secret
          ports:
            - name: mssqlport
              containerPort: 1433
              protocol: TCP
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              cpu: 4
              memory: 6Gi
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /var/opt/mssql
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: mssql-2025
