---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-2025
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: mssql-2025-dst
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-block
