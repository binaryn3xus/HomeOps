---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudbeaver
spec:
  data:
    - remoteRef:
        key: CloudBeaver-Root-Password
      secretKey: CLOUDBEAVER_ROOT_PASSWORD
  refreshInterval: "12h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    creationPolicy: Owner
    name: cloudbeaver-secret
    template:
      data:
        CLOUDBEAVER_ROOT_PASSWORD: "{{ .CLOUDBEAVER_ROOT_PASSWORD }}"
      engineVersion: v2
