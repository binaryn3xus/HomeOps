apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: database
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudbeaver
      app.kubernetes.io/instance: cloudbeaver
      app.kubernetes.io/controller: cloudbeaver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudbeaver
        app.kubernetes.io/instance: cloudbeaver
        app.kubernetes.io/controller: cloudbeaver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: app
          image: dbeaver/cloudbeaver:26.0.1@sha256:97df6d994d6f5b10a9e4708ad075302def39b9328d00b89f83040062d5e4f877
          env:
            - name: TZ
              value: America/New_York
          envFrom:
            - secretRef:
                name: cloudbeaver-secret
          ports:
            - name: http
              containerPort: 8978
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cloudbeaver
