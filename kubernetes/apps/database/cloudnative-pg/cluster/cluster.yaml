---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name home-ops
  annotations:
    # Required for seamless bootstrap to avoid empty WAL archive check issues
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg-secret

  postgresql:
    parameters:
      max_connections: "600"
      max_slot_wal_keep_size: 30GB
      shared_buffers: 512MB

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 4Gi

  storage:
    size: 10Gi
    storageClass: ceph-block

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters: &barmanParameters
        barmanObjectName: *name

  # ============================================================================
  # BOOTSTRAP CONFIGURATION - Choose ONE section below
  # ============================================================================

  # Initial setup: Use this ONLY for the very first deployment
  # bootstrap:
  #   initdb:
  #     database: app
  #     owner: postgres
  #     secret:
  #       name: cloudnative-pg-secret

  # GitOps Recovery: Uncomment this (and comment initdb) after the first backup exists
  bootstrap:
    recovery:
      source: origin

  # ============================================================================

  # External cluster reference for recovery
  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters: *barmanParameters

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: false
