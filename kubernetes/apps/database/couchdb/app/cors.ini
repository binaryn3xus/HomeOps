[chttpd]
enable_cors = true

[httpd]
enable_cors = true

[cors]
origins = https://obsidian.unscfleet.com, app://obsidian.md, capacitor://localhost, http://localhost
credentials = true
methods = GET, PUT, POST, HEAD, DELETE, OPTIONS
headers = accept, authorization, content-type, origin, referer, x-couch-request-id, x-couchdb-body-time
max_age = 3600

[couchdb]
max_document_size = 50000000

[chttpd]
max_http_request_size = 50000000

# Aggressive compaction to handle frequent Obsidian revisions
[compactions]
_default = [{db_fragmentation, "30%"}, {view_fragmentation, "30%"}]

[compaction_daemon]
check_interval = 300
min_file_size = 256000

# Enable Prometheus metrics endpoint
[prometheus]
additional_port = false
