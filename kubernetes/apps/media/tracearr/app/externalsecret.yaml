---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tracearr
spec:
  data:
    - remoteRef:
        key: Tracearr-Jwt-Secret
      secretKey: jwt_secret
    - remoteRef:
        key: Tracearr-Cookie-Secret
      secretKey: cookie_secret
    - remoteRef:
        key: Tracearr-Db-Password
      secretKey: db_password
    - remoteRef:
        key: Cloudflare-R2-Access-Key
      secretKey: r2_access_key
    - remoteRef:
        key: Cloudflare-R2-Secret-Key
      secretKey: r2_secret_key
  refreshInterval: "12h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    creationPolicy: Owner
    name: tracearr-secret
    template:
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        COOKIE_SECRET: "{{ .cookie_secret }}"
        # CNPG Cluster credentials
        username: tracearr
        password: "{{ .db_password }}"
        # Tracearr app connection string
        DATABASE_URL: "postgresql://tracearr:{{ .db_password }}@tracearr-db-rw.media.svc.cluster.local:5432/tracearr"
        # R2 Backup credentials for CNPG
        backupAccessKeyId: "{{ .r2_access_key }}"
        backupAccessSecret: "{{ .r2_secret_key }}"
        # Redis is internal, so we don't need an external URL
      engineVersion: v2
