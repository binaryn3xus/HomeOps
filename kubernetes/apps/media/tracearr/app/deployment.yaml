---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tracearr
      app.kubernetes.io/instance: tracearr
      app.kubernetes.io/controller: tracearr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracearr
        app.kubernetes.io/instance: tracearr
        app.kubernetes.io/controller: tracearr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/connorgallopo/tracearr:1.4.27
          env:
            - name: TZ
              value: America/New_York
          envFrom:
            - secretRef:
                name: tracearr-secret
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: image-cache
              mountPath: /app/data/image-cache
      volumes:
        - name: image-cache
          persistentVolumeClaim:
            claimName: tracearr-image-cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracearr-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tracearr
      app.kubernetes.io/instance: tracearr
      app.kubernetes.io/controller: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracearr
        app.kubernetes.io/instance: tracearr
        app.kubernetes.io/controller: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: ghcr.io/valkey-io/valkey:8.0.2
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
