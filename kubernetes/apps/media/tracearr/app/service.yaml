---
apiVersion: v1
kind: Service
metadata:
  name: tracearr
  namespace: media
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: tracearr
    app.kubernetes.io/instance: tracearr
    app.kubernetes.io/controller: tracearr
---
apiVersion: v1
kind: Service
metadata:
  name: tracearr-redis
  namespace: media
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: tracearr
    app.kubernetes.io/instance: tracearr
    app.kubernetes.io/controller: redis
