apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: bittorrent
      port: 50413
      targetPort: 50413
      protocol: TCP
  selector:
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/instance: qbittorrent
    app.kubernetes.io/controller: qbittorrent
