apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  annotations:
    gatus.home-operations.com/endpoint: |-
      dns:
        query-name: qbittorrent.unscfleet.com
        query-type: A
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - qbittorrent.unscfleet.com
  rules:
    - backendRefs:
        - name: qbittorrent
          port: 80
