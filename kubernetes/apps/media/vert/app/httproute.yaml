apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vert
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - vert.unscfleet.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vert
          port: 80
