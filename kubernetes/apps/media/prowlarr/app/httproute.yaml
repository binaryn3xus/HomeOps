apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  annotations:
    gatus.home-operations.com/endpoint: |-
      dns:
        query-name: prowlarr.unscfleet.com
        query-type: A
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - prowlarr.unscfleet.com
  rules:
    - backendRefs:
        - name: prowlarr
          port: 80
