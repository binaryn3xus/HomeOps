apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  annotations:
    gatus.home-operations.com/endpoint: |-
      conditions: ["[STATUS] == 401"]
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - plex.unscfleet.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /library/streams
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove: ["Range"]
      backendRefs:
        - name: plex
          port: 32400
    - backendRefs:
        - name: plex
          port: 32400
