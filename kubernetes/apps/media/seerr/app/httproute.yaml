apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seerr
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - seerr.unscfleet.com
    - requests.unscfleet.com
  rules:
    - backendRefs:
        - name: seerr
          port: 80
