---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/resources.teleport.dev/teleportprovisiontoken_v2.json
apiVersion: resources.teleport.dev/v2
kind: TeleportProvisionToken
metadata:
  name: agent-join-token
spec:
  roles: [kube,app,discovery,node,windowsdesktop]
  join_method: kubernetes
  kubernetes:
    type: in_cluster
    allow:
      - service_account: "teleport:teleport-agent"
