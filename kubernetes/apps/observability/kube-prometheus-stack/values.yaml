crds:
  enabled: true
cleanPrometheusOperatorObjectNames: true
alertmanager:
  route:
    main:
      annotations:
        gatus.home-operations.com/enabled: "true"
        gatus.home-operations.com/endpoint: |-
          conditions: ["len([BODY]) == 0"]
          group: internal
          dns:
            query-name: alertmanager.unscfleet.com
            query-type: A
          url: 1.1.1.1
      enabled: true
      hostnames: ["alertmanager.unscfleet.com"]
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
  alertmanagerSpec:
    replicas: 2
    secrets: ["alertmanager-secret"]
    alertmanagerConfiguration:
      name: alertmanager
      global:
        resolveTimeout: 5m
    externalUrl: "https://alertmanager.unscfleet.com"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: openebs-hostpath
          resources:
            requests:
              storage: 1Gi
prometheus-node-exporter:
  fullnameOverride: node-exporter
  extraArgs:
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/containerd/.+|var/lib/docker/.+|var/lib/kubelet/.+|etc/nfsmount.conf|var/mnt/local-hostpath)($|/)
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
kubeApiServer:
  serviceMonitor:
    selector:
      matchLabels:
        component: apiserver
        provider: kubernetes
kubeControllerManager:
  enabled: true
  service:
    selector:
      component: kube-controller-manager
kubeEtcd:
  enabled: true
  endpoints:
    - 10.0.30.11
    - 10.0.30.12
    - 10.0.30.13
kubeScheduler:
  enabled: true
  service:
    selector:
      component: kube-scheduler
kubeProxy:
  enabled: false
prometheus:
  route:
    main:
      annotations:
        gatus.home-operations.com/enabled: "true"
        gatus.home-operations.com/endpoint: |-
          conditions: ["len([BODY]) == 0"]
          group: internal
          dns:
            query-name: prometheus.unscfleet.com
            query-type: A
          url: 1.1.1.1
      enabled: true
      hostnames: ["prometheus.unscfleet.com"]
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
  prometheusSpec:
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    enableAdminAPI: true
    walCompression: true
    enableFeatures:
      - memory-snapshot-on-shutdown
    retention: 14d
    retentionSize: 8GB
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 2000Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: openebs-hostpath
          resources:
            requests:
              storage: 10Gi
grafana:
  enabled: false
  forceDeployDashboards: true
  sidecar:
    dashboards:
      multicluster:
        etcd:
          enabled: true
additionalPrometheusRulesMap:
  dockerhub-rules:
    groups:
      - name: dockerhub
        rules:
          - alert: DockerhubRateLimitRisk
            annotations:
              summary: Kubernetes cluster Dockerhub rate limit risk
            expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
            labels:
              severity: critical
  oom-rules:
    groups:
      - name: oom
        rules:
          - alert: OomKilled
            annotations:
              summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
            expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
            labels:
              severity: critical
