apiVersion: apps/v1
kind: Deployment
metadata:
  name: kromgo
  namespace: observability
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kromgo
      app.kubernetes.io/instance: kromgo
      app.kubernetes.io/controller: kromgo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kromgo
        app.kubernetes.io/instance: kromgo
        app.kubernetes.io/controller: kromgo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/kashalls/kromgo:v0.9.1@sha256:1624b1a10009978243d7d54e83269cbf9e3a4ec7f14c2548bdd11e63db5c4ad7
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus-operated.observability.svc.cluster.local:9090
            - name: SERVER_PORT
              value: "80"
            - name: HEALTH_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 80
            - name: health
              containerPort: 8080
          livenessProbe: &probe
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe: *probe
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: config-file
              mountPath: /kromgo/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config-file
          configMap:
            name: kromgo-configmap
