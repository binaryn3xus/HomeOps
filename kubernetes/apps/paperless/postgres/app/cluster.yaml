---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-postgres
  namespace: paperless
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  storage:
    size: 10Gi
    storageClass: ceph-block

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters: &barmanParameters
        barmanObjectName: paperless-postgres

  # ============================================================================
  # BOOTSTRAP CONFIGURATION - Choose ONE section below
  # ============================================================================

  # Initial setup: Use this ONLY for the very first deployment
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-secrets

  # GitOps Recovery: Uncomment this (and comment initdb) after the first backup exists
  # bootstrap:
  #   recovery:
  #     source: origin

  # ============================================================================

  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters: *barmanParameters

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
