---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: paperless-postgres
  namespace: paperless
spec:
  backupOwnerReference: self
  cluster:
    name: paperless-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  schedule: "0 30 4 * * *" # Once a day at 4:30 AM
