apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tika
      app.kubernetes.io/instance: tika
      app.kubernetes.io/controller: tika
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tika
        app.kubernetes.io/instance: tika
        app.kubernetes.io/controller: tika
    spec:
      containers:
        - name: app
          image: docker.io/apache/tika:3.3.0.0
          ports:
            - name: http
              containerPort: 9998
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m

              memory: 1024Mi
