apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ai-env
data:
  # --- SYSTEM LOCALIZATION ---
  TZ: "America/New_York"

  # --- USER & GROUP IDs ---
  PUID: "1000"
  PGID: "1000"

  # --- PAPERLESS AI CONFIGURATION ---
  PAPERLESS_AI_PORT: "3000"
  PAPERLESS_API_URL: http://paperless.paperless.svc.cluster.local:8000/api
  PAPERLESS_AI_INITIAL_SETUP: "yes"
  SCAN_INTERVAL: "*/30 * * * *"
  DISABLE_AUTOMATIC_PROCESSING: "false"
  PROCESS_PREDEFINED_DOCUMENTS: "true"
  TOKEN_LIMIT: "128000"
  RESPONSE_TOKENS: "1000"
  USE_EXISTING_DATA: "true"
  USE_PROMPT_TAGS: "true"

  # --- AI CONFIGURATION ---
  AI_PROVIDER: ollama
  OLLAMA_API_URL: http://ollama.ai.svc.cluster.local:11434
  OLLAMA_MODEL: llama3.2
