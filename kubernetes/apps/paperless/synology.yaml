---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: synology-paperless # PV names are cluster-scoped, so I'll keep a unique name but the PVC can be 'synology'
spec:
  storageClassName: synology-nfs
  capacity:
    storage: 1Mi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "10.0.30.4"
    path: /volume1/Paperless
  mountOptions:
    - nfsvers=4.1
    - nconnect=8
    - hard
    - noatime
    - rsize=131072
    - wsize=131072
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synology
  namespace: paperless
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: synology-nfs
  volumeName: synology-paperless
  resources:
    requests:
      storage: 1Mi
