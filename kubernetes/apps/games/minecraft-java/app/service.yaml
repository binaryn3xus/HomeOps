apiVersion: v1
kind: Service
metadata:
  name: minecraft-java
  namespace: games
  annotations:
    lbipam.cilium.io/ips: "10.0.30.36"
spec:
  type: LoadBalancer
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
  selector:
    app.kubernetes.io/name: minecraft-java
    app.kubernetes.io/instance: minecraft-java
    app.kubernetes.io/controller: minecraft
