---
apiVersion: v1
kind: Namespace
metadata:
  name: database
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: database-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: cloudnative-pg-operator
            path: kubernetes/apps/database/cloudnative-pg/operator
            chart: cloudnative-pg
            repo: oci://ghcr.io/cloudnative-pg/charts
            version: 0.28.0
            wave: "-3"
          - app: cloudnative-pg-cluster
            path: kubernetes/apps/database/cloudnative-pg/cluster
            wave: "-1"
          - app: cloudnative-pg-plugin-barman-cloud
            path: kubernetes/apps/database/cloudnative-pg/plugin-barman-cloud
            chart: plugin-barman-cloud
            repo: oci://ghcr.io/cloudnative-pg/charts
            version: 0.5.0
            wave: "-1"
          - app: mssql-2025
            path: kubernetes/apps/database/mssql-2025/app
            wave: "-1"
          - app: cloudbeaver
            path: kubernetes/apps/database/cloudbeaver/app
            wave: "1"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps/
          targetRevision: main
          path: "{{.path}}"
        {{- if .chart }}
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
        {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: database
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
