---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-system-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: cilium
            path: kubernetes/apps/kube-system/cilium/app
            chart: cilium
            repo: oci://ghcr.io/home-operations/charts-mirror
            version: 1.18.6
            wave: "-5"
          - app: coredns
            path: kubernetes/apps/kube-system/coredns/app
            chart: coredns
            repo: oci://ghcr.io/coredns/charts
            version: 1.45.2
            wave: "-5"
          - app: intel-device-plugin
            path: kubernetes/apps/kube-system/intel-device-plugin/app
            chart: intel-device-plugins-operator
            repo: oci://ghcr.io/home-operations/charts-mirror
            version: 0.32.1
            wave: "-4"
          - app: metrics-server
            path: kubernetes/apps/kube-system/metrics-server/app
            chart: metrics-server
            repo: oci://ghcr.io/home-operations/charts-mirror
            version: 3.12.2
            wave: "-4"
          - app: node-feature-discovery
            path: kubernetes/apps/kube-system/node-feature-discovery/app
            chart: node-feature-discovery
            repo: https://kubernetes-sigs.github.io/node-feature-discovery/charts
            version: 0.18.3
            wave: "-4"
          - app: nvidia-device-plugin
            path: kubernetes/apps/kube-system/nvidia-device-plugin/app
            chart: nvidia-device-plugin
            repo: https://nvidia.github.io/k8s-device-plugin
            version: 0.19.0
            wave: "-4"
          - app: reloader
            path: kubernetes/apps/kube-system/reloader/app
            chart: reloader
            repo: oci://ghcr.io/home-operations/charts-mirror
            version: 1.2.1
            wave: "-4"
          - app: spegel
            path: kubernetes/apps/kube-system/spegel/app
            chart: spegel
            repo: oci://ghcr.io/home-operations/charts-mirror
            version: v0.0.30
            wave: "-4"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps/
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
