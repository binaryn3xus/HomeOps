---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-system-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: cilium
            path: kubernetes/apps/kube-system/cilium
            chart: cilium
            repo: oci://quay.io/cilium/charts/cilium
            version: 1.19.2
            wave: "-5"
          - app: coredns
            path: kubernetes/apps/kube-system/coredns
            chart: coredns
            repo: oci://ghcr.io/coredns/charts/coredns
            version: 1.45.2
            wave: "-5"
          - app: intel-device-plugin
            path: kubernetes/apps/kube-system/intel-device-plugin
            chart: intel-device-plugins-operator
            repo: oci://ghcr.io/intel/intel-device-plugins-for-kubernetes/charts
            version: 0.32.1
            wave: "-4"
          - app: metrics-server
            path: kubernetes/apps/kube-system/metrics-server
            chart: metrics-server
            repo: oci://registry-1.docker.io/bitnamicharts/metrics-server
            version: 3.12.2
            wave: "-4"
          - app: node-feature-discovery
            path: kubernetes/apps/kube-system/node-feature-discovery
            chart: node-feature-discovery
            repo: oci://ghcr.io/kubernetes-sigs/node-feature-discovery/charts
            version: 0.18.3
            wave: "-4"
          - app: nvidia-device-plugin
            path: kubernetes/apps/kube-system/nvidia-device-plugin
            chart: nvidia-device-plugin
            repo: oci://nvidia.github.io/k8s-device-plugin
            version: 0.19.0
            wave: "-4"
          - app: reloader
            path: kubernetes/apps/kube-system/reloader
            chart: reloader
            repo: oci://ghcr.io/stakater/charts
            version: 2.2.9
            wave: "-4"
          - app: spegel
            path: kubernetes/apps/kube-system/spegel
            chart: spegel
            repo: oci://ghcr.io/spegel-org/helm-charts
            version: 0.6.0
            wave: "-4"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
