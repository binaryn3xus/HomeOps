---
apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
# Helm-based Rook Ceph Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rook-ceph-helm-apps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - list:
        elements:
          - app: rook-ceph-operator
            path: kubernetes/apps/rook-ceph/rook-ceph
            chart: rook-ceph
            repo: oci://ghcr.io/rook/rook-ceph
            version: v1.19.3
            wave: "-5"
          - app: rook-ceph-cluster
            path: kubernetes/apps/rook-ceph/rook-ceph/cluster
            chart: rook-ceph-cluster
            repo: oci://ghcr.io/rook/rook-ceph-cluster
            version: v1.19.3
            wave: "-4"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: rook-ceph
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
      ignoreDifferences:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jsonPointers:
            - /spec/hostnames
            - /spec/parentRefs
            - /spec/rules
