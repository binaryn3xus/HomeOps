---
apiVersion: v1
kind: Namespace
metadata:
  name: teleport
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
# Unified Teleport Stack (Cluster + Agent + Resources)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: teleport-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: teleport-cluster
            path: kubernetes/apps/teleport/cluster/app
            chart: teleport-cluster
            repo: https://charts.releases.teleport.dev
            version: 18.7.3
  template:
    metadata:
      name: "{{.app}}"
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps/
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps/
          targetRevision: main
          path: "{{.path}}/configs"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: teleport
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
