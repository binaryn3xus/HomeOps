---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
# Helm-based Observability Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-helm-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: prometheus-operator-crds
            path: kubernetes/apps/observability/prometheus-operator-crds
            chart: prometheus-operator-crds
            repo: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
            version: 28.0.1
            wave: "-5"
          - app: kube-prometheus-stack
            path: kubernetes/apps/observability/kube-prometheus-stack
            chart: kube-prometheus-stack
            repo: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
            version: 82.18.0
            wave: "-4"
          - app: loki
            path: kubernetes/apps/observability/loki
            chart: loki
            repo: oci://ghcr.io/grafana/helm-charts/loki
            version: 6.55.0
            wave: "-2"
          - app: goldilocks
            path: kubernetes/apps/observability/goldilocks
            chart: goldilocks
            repo: https://charts.fairwinds.com/stable
            version: 10.3.0
            wave: "1"
          - app: grafana
            path: kubernetes/apps/observability/grafana
            chart: grafana-operator
            repo: oci://ghcr.io/grafana/helm-charts/grafana-operator
            version: v5.13.0
            wave: "1"
          - app: promtail
            path: kubernetes/apps/observability/promtail
            chart: promtail
            repo: oci://ghcr.io/grafana/helm-charts/promtail
            version: 6.16.6
            wave: "1"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: observability
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
      ignoreDifferences:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jsonPointers:
            - /spec/hostnames
            - /spec/parentRefs
            - /spec/rules
---
# Plain Manifest Observability Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-plain-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: gatus
            path: kubernetes/apps/observability/gatus
            wave: "1"
          - app: kromgo
            path: kubernetes/apps/observability/kromgo
            wave: "1"
          - app: unpoller
            path: kubernetes/apps/observability/unpoller
            wave: "1"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      source:
        repoURL: https://github.com/binaryn3xus/HomeOps
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: observability
      syncPolicy:
        automated:
          enabled: false
          prune: false
          selfHeal: false
        syncOptions:
          - ServerSideApply=true
      ignoreDifferences:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jsonPointers:
            - /spec/hostnames
            - /spec/parentRefs
            - /spec/rules
