---
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: default-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: mosquitto
            path: kubernetes/apps/default/mosquitto
            wave: "-1"
          - app: audiobookshelf
            path: kubernetes/apps/default/audiobookshelf
          - app: bazarr
            path: kubernetes/apps/default/bazarr
          - app: esphome
            path: kubernetes/apps/default/esphome
          - app: home-assistant
            path: kubernetes/apps/default/home-assistant
          - app: it-tools
            path: kubernetes/apps/default/it-tools
          - app: jellyfin
            path: kubernetes/apps/default/jellyfin
          - app: maintainerr
            path: kubernetes/apps/default/maintainerr
            wave: "1"
          - app: n8n
            path: kubernetes/apps/default/n8n
          - app: overseerr
            path: kubernetes/apps/default/overseerr
            wave: "1"
          - app: plex
            path: kubernetes/apps/default/plex
          - app: prowlarr
            path: kubernetes/apps/default/prowlarr
          - app: radarr
            path: kubernetes/apps/default/radarr
            wave: "1"
          - app: sabnzbd
            path: kubernetes/apps/default/sabnzbd
          - app: sonarr
            path: kubernetes/apps/default/sonarr
            wave: "1"
          - app: tautulli
            path: kubernetes/apps/default/tautulli
            wave: "1"
          - app: tdarr
            path: kubernetes/apps/default/tdarr
          - app: vert
            path: kubernetes/apps/default/vert
          - app: watchstate
            path: kubernetes/apps/default/watchstate
            wave: "1"
          - app: zigbee
            path: kubernetes/apps/default/zigbee
          - app: zwave
            path: kubernetes/apps/default/zwave
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      source:
        repoURL: https://github.com/binaryn3xus/HomeOps
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
