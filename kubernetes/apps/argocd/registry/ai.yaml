---
apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    volsync.backube/privileged-movers: "true"
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    volsync.backube/privileged-movers: "true"
---
# Helm-based AI Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-helm-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: openclaw-operator
            path: kubernetes/apps/ai/openclaw-operator/operator
            chart: openclaw-operator
            repo: oci://ghcr.io/openclaw-rocks/charts/openclaw-operator
            version: 0.26.2
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      sources:
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          ref: values
        - repoURL: https://github.com/binaryn3xus/HomeOps
          targetRevision: main
          path: "{{.path}}"
        - repoURL: "{{.repo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.version}}"
          helm:
            releaseName: "{{.app}}"
            valueFiles:
              - $values/{{.path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: ai
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
---
# Plain Manifest AI Apps
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-plain-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - app: ollama
            path: kubernetes/apps/ai/ollama
          - app: openclaw-instances
            path: kubernetes/apps/ai/openclaw-operator/instances
          - app: comfyui
            path: kubernetes/apps/ai/comfyui
            wave: "1"
          - app: mcp-gateway
            path: kubernetes/apps/ai/mcp-gateway
            wave: "1"
          - app: open-webui
            path: kubernetes/apps/ai/open-webui
            wave: "1"
          - app: searxng
            path: kubernetes/apps/ai/searxng
            wave: "1"
  template:
    metadata:
      name: "{{.app}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .wave | default "0" }}'
    spec:
      project: home-ops
      source:
        repoURL: https://github.com/binaryn3xus/HomeOps
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: ai
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
