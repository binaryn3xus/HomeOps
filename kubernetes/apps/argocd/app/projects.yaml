---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: home-ops
  namespace: argocd
spec:
  description: Project for HomeOps applications
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  sourceRepos:
    - https://github.com/binaryn3xus/HomeOps
    - oci://*
    - https://*
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
