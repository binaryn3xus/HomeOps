---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ddns-updater
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: Cloudflare-Api-Token
        metadataPolicy: None
      secretKey: CF_API_TOKEN
  refreshInterval: "12h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    name: ddns-updater-secret
    template:
      data:
        config.json: |
          {
            "settings": [
              {
                "provider": "cloudflare",
                "domain": "unscfleet.com",
                "host": "mc-java",
                "token": "{{ .CF_API_TOKEN }}",
                "ip_version": "ipv4",
                "proxied": false
              },
              {
                "provider": "cloudflare",
                "domain": "unscfleet.com",
                "host": "mc-bedrock",
                "token": "{{ .CF_API_TOKEN }}",
                "ip_version": "ipv4",
                "proxied": false
              }
            ]
          }
      engineVersion: v2
      mergePolicy: Replace
