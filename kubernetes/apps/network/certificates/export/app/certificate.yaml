---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: unscfleet-com
spec:
  secretName: unscfleet-com-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: unscfleet.com
  dnsNames: ["unscfleet.com", "*.unscfleet.com"]
